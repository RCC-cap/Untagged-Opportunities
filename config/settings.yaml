# Application settings

schedule:
  cron: "0 10 * * *"          # Daily at 10:00 AM
  timezone: "Europe/Rome"

processing:
  batch_size: 200              # Rows per AI call (GPT 5.4 handles large context)
  max_batches_per_run: 500     # Safety limit per daily run (500 × 200 = 100K rows)
  always_send_email: true      # Every untagged opp is sent to Sales Lead regardless of confidence
  auto_approve_threshold: 90   # Auto-approve if confidence >= this (should-have)
  skip_already_processed: true # Skip OppIDs already in audit log

azure_openai:
  model: "gpt-5.4"             # Single model for all processing
  temperature: 0.2
  max_tokens: 800

scoring:
  account_history_weight: 1.5  # Strong boost when account has prior tagged deals
  min_deals_for_boost: 2       # Minimum prior deals to trigger account history signal

sharepoint:
  sheet_name: "Sheet1"         # Sheet containing opportunity data
  partner_column: "Partner"    # Column name for partner tag
  skip_sheets:                 # Sheets to ignore (VBA, macros)
    - "Macros"
    - "Config"

approval:
  email_subject: "THOR — Partner Tag Recommendation for Review"
  response_timeout_days: 7     # Days before escalation
  reminder_after_days: 3       # Send reminder after N days

audit:
  format: "jsonl"              # One JSON object per line
  retention_days: 365

webhook:
  base_url: "https://thor.example.com/api"  # Replace with actual deployed URL
  token_ttl_hours: 168         # Token valid for 7 days
