# Application settings

schedule:
  cron: "0 10 * * *"          # Daily at 10:00 AM
  timezone: "Europe/Rome"

processing:
  batch_size: 6                # Rows per processing cycle (test: 6, prod: 200)
  max_batches_per_run: 1       # Safety limit per daily run (test: 1 batch)
  always_send_email: true      # Every untagged opp is sent to Sales Lead regardless of confidence
  auto_approve_threshold: 90   # Auto-approve if confidence >= this (should-have)
  skip_already_processed: false # Skip OppIDs already in Cosmos DB

# Test mode: filter to specific accounts and override Opty Lead
test:
  enabled: true
  accounts:
    - "GSK | BE"
    - "TOYOTA Motor Europe"
    - "Roche Holding AG"
  max_per_account: 2           # Process N opps per test account
  override_lead: "riccardo-carlo.conte@capgemini.com"

blob:
  container_name: "thor-data"  # Azure Blob container
  blob_name: "Copy of Untagged optys 20.04.2026.xlsx"

azure_openai:
  model: "gpt-4o-mini"         # Primary reasoning model
  deployment: "gpt-4o-mini"   # Azure deployment name
  temperature: 0.2
  max_tokens: 800
  fallback_on_error: true      # Fall back to deterministic scoring if LLM fails

scoring:
  account_history_weight: 1.5  # Strong boost when account has prior tagged deals
  min_deals_for_boost: 2       # Minimum prior deals to trigger account history signal

cosmos:
  database: "thor"             # Cosmos DB database name
  container: "pipeline-state"  # Container name (partition key: /opp_id)

sharepoint:
  sheet_name: "Sheet1"         # Sheet containing opportunity data
  partner_column: "Partner"    # Column name for partner tag
  skip_sheets:                 # Sheets to ignore (VBA, macros)
    - "Macros"
    - "Config"

approval:
  email_subject: "THOR — Partner Tag Recommendation for Review"
  response_timeout_days: 7     # Days before escalation
  reminder_after_days: 3       # Send reminder after N days

audit:
  format: "jsonl"              # One JSON object per line (local backup)
  retention_days: 365

webhook:
  base_url: "https://thor-api-rcc.azurewebsites.net/api"
  token_ttl_hours: 168         # Token valid for 7 days
